<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunder Mifflin Scranton - Happiness Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/cdn@3.4.1"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .office-font { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    </style>
</head>
<body class="bg-[#F3F2EF] text-gray-800 pb-12">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Vos clés Firebase d'origine
        const firebaseConfig = {
          apiKey: "AIzaSyBxhluuagrClX9t7ypI6iICV3Wv96eaoNQ",
          authDomain: "lovebase-aa157.firebaseapp.com",
          projectId: "lovebase-aa157",
          storageBucket: "lovebase-aa157.firebasestorage.app",
          messagingSenderId: "836300089701",
          appId: "1:836300089701:web:97ade7398389822c6c198c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CITATIONS DE MICHAEL SCOTT ---
        const quotes = [
            "I'm not superstitious, but I am a little stitious.",
            "Would I rather be feared or loved? Easy. Both. I want people to be afraid of how much they love me.",
            "Sometimes I'll start a sentence and I don't even know where it's going.",
            "I am running away from my responsibilities. And it feels good.",
            "The worst thing about prison was the Dementors.",
            "I love inside jokes. I'd love to be a part of one someday.",
            "Toby is in HR, so he's not really a part of our family."
        ];
        document.getElementById('quote-box').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

        // ================= SYNCHRONISATION EN TEMPS RÉEL =================

        // 1. Les Joueurs
        onSnapshot(collection(db, "players"), (snapshot) => {
            const container = document.getElementById('players-list');
            const gridMeteo = document.getElementById('meteo-grid');
            if(!container || !gridMeteo) return;
            container.innerHTML = "";
            gridMeteo.innerHTML = "";
            
            snapshot.docs.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;

                container.innerHTML += `
                    <div class="p-3 border rounded bg-gray-50 flex flex-col justify-between shadow-sm">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-md">${p.name}</span>
                            <span class="text-2xl">${p.mood || '😐'}</span>
                        </div>
                        <p class="text-xs text-gray-500 italic my-1">"${p.moodText || 'Working...'}"</p>
                        <button onclick="boostLove('${id}', ${p.love || 0})" class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded font-bold w-max mt-1 hover:bg-red-200 transition">
                            ❤️ Love (${p.love || 0})
                        </button>
                    </div>
                `;

                gridMeteo.innerHTML += `
                    <div class="p-3 border rounded text-center bg-blue-50/50 shadow-inner">
                        <div class="text-3xl mb-1">${p.mood || '😐'}</div>
                        <div class="font-bold text-xs truncate">${p.name}</div>
                    </div>
                `;
            });
        });

        // 2. Les Post-its
        onSnapshot(collection(db, "posts"), (snapshot) => {
            const container = document.getElementById('posts-container');
            if(!container) return;
            container.innerHTML = "";
            snapshot.docs.forEach(docSnap => {
                const post = docSnap.data();
                const id = docSnap.id;
                let commentsHtml = "";
                
                post.comments?.forEach(c => {
                    commentsHtml += `<p class="bg-white/70 p-1 rounded my-1 text-[11px]">💬 ${c}</p>`;
                });

                container.innerHTML += `
                    <div class="min-w-[240px] max-w-[240px] bg-amber-100 p-4 rounded shadow-md transform rotate-1 hover:rotate-0 transition flex flex-col justify-between border-b-4 border-amber-300">
                        <div>
                            <p class="text-xs font-semibold text-gray-700">${post.text}</p>
                            ${post.media ? `<img src="${post.media}" class="w-full h-24 object-cover rounded my-2" />` : ''}
                        </div>
                        <div class="border-t pt-2 mt-2 border-amber-200">
                            <div class="max-h-20 overflow-y-auto mb-2">${commentsHtml}</div>
                            <div class="flex gap-1">
                                <input type="text" id="input-${id}" placeholder="Répondre..." class="w-full text-xs p-1 rounded border bg-white outline-none">
                                <button onclick="sendComment('${id}', ${JSON.stringify(post.comments || []).replace(/"/g, '&quot;')})" class="bg-amber-600 text-white text-xs px-2 rounded">📤</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        // 3. Les Cartons
        onSnapshot(collection(db, "cards"), (snapshot) => {
            const container = document.getElementById('cards-list');
            if(!container) return;
            container.innerHTML = "";
            snapshot.docs.forEach(docSnap => {
                const c = docSnap.data();
                const id = docSnap.id;

                container.innerHTML += `
                    <div class="p-3 border rounded shadow-sm ${c.color === 'Red' ? 'bg-red-50 border-red-200' : 'bg-yellow-50 border-yellow-200'}">
                        <div class="flex justify-between font-bold text-sm">
                            <span>${c.color === 'Red' ? '🟥' : '🟨'} Pour ${c.target}</span>
                            <span class="bg-white px-2 rounded text-[10px] border">${c.status}</span>
                        </div>
                        <p class="text-xs my-1"><strong>Motif :</strong> ${c.reason}</p>
                        <p class="text-xs text-purple-950 font-semibold"><strong>Gage :</strong> ${c.pledge}</p>
                        
                        ${!c.contested && c.status === 'En attente' ? `
                            <button onclick="contest('${id}')" class="mt-2 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded font-bold">Contester ✋</button>
                        ` : ''}

                        ${c.contested && c.status === 'En attente' ? `
                            <div class="mt-2 p-1.5 bg-white/80 rounded text-[11px]">
                                <p class="text-orange-700 italic">"Contestation : ${c.contestReason}"</p>
                                <div class="mt-1 flex gap-2">
                                    <button onclick="vote('${id}', ${c.votesYes}, ${c.votesNo}, 'yes')" class="bg-green-600 text-white px-2 py-0.5 rounded">Maintenir (${c.votesYes})</button>
                                    <button onclick="vote('${id}', ${c.votesYes}, ${c.votesNo}, 'no')" class="bg-gray-500 text-white px-2 py-0.5 rounded">Annuler (${c.votesNo})</button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        });

        // 4. Les Remerciements
        onSnapshot(collection(db, "thanks"), (snapshot) => {
            const container = document.getElementById('thanks-list');
            if(!container) return;
            container.innerHTML = "";
            snapshot.docs.forEach(docSnap => {
                const t = docSnap.data();
                container.innerHTML += `
                    <div class="p-2 bg-green-50 border border-green-200 rounded text-xs shadow-sm">
                        <strong>${t.from}</strong> à <strong>${t.to}</strong> : <span class="italic">"${t.text}"</span>
                    </div>
                `;
            });
        });

        // 5. Les Paris Cafés
        onSnapshot(collection(db, "bets"), (snapshot) => {
            const container = document.getElementById('bets-list');
            if(!container) return;
            container.innerHTML = "";
            snapshot.docs.forEach(docSnap => {
                const b = docSnap.data();
                const id = docSnap.id;
                container.innerHTML += `
                    <div class="p-3 bg-amber-50 border border-amber-200 rounded flex justify-between items-center text-xs shadow-sm">
                        <div><strong>${b.creator} vs ${b.challenger}</strong>: ${b.description}</div>
                        <button onclick="closeBet('${id}')" ${b.status !== 'Ouvert' ? 'disabled' : ''} class="bg-amber-800 text-white text-[10px] px-2 py-1 rounded font-bold">
                            ${b.status === 'Ouvert' ? '☕ Clôturer' : 'Fait'}
                        </button>
                    </div>
                `;
            });
        });

        // ================= ATTACHE DES FONCTIONS AU CONTEXTE WINDOWS (OBLIGATOIRE POUR MODULE) =================
        window.addPlayer = async () => {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            await addDoc(collection(db, "players"), { name: name, mood: "😐", moodText: "Freshly hired", love: 0 });
            document.getElementById('p-name').value = "";
        };

        window.boostLove = async (id, current) => {
            await updateDoc(doc(db, "players", id), { love: current + 1 });
        };

        window.changeMood = async (emoji) => {
            const reason = prompt("Pourquoi ce changement d'humeur ?");
            onSnapshot(collection(db, "players"), (snap) => {
                if(snap.docs.length > 0) {
                    updateDoc(doc(db, "players", snap.docs[0].id), { mood: emoji, moodText: reason || "RAS" });
                }
            }, { onlyOnce: true });
        };

        window.addPost = async () => {
            const text = document.getElementById('post-text').value;
            const media = document.getElementById('post-media').value;
            if(!text) return;
            await addDoc(collection(db, "posts"), { text, media, comments: [] });
            document.getElementById('post-text').value = "";
            document.getElementById('post-media').value = "";
        };

        window.sendComment = async (id, currentComments) => {
            const input = document.getElementById(`input-${id}`);
            if(!input || !input.value) return;
            const updated = [...currentComments, input.value];
            await updateDoc(doc(db, "posts", id), { comments: updated });
        };

        window.addCard = async () => {
            const target = document.getElementById('card-target').value;
            const color = document.getElementById('card-color').value;
            const reason = document.getElementById('card-reason').value;
            const pledge = document.getElementById('card-pledge').value;
            if(!target || !reason) return;
            await addDoc(collection(db, "cards"), { target, color, reason, pledge, contested: false, contestReason: "", votesYes: 0, votesNo: 0, status: "En attente" });
        };

        window.contest = async (id) => {
            const r = prompt("Raison du désaccord :");
            if(r) await updateDoc(doc(db, "cards", id), { contested: true, contestReason: r });
        };

        window.vote = async (id, y, n, type) => {
            let yes = y + (type === 'yes' ? 1 : 0);
            let no = n + (type === 'no' ? 1 : 0);
            let status = "En attente";
            if ((yes + no) >= 2) { // Quorum fixé à 2 votes pour simplifier le test
                status = yes > no ? "Maintenu (Gage)" : "Annulé 🎉";
            }
            await updateDoc(doc(db, "cards", id), { votesYes: yes, votesNo: no, status });
        };

        window.addThank = async () => {
            const from = document.getElementById('t-from').value;
            const to = document.getElementById('t-to').value;
            const text = document.getElementById('t-text').value;
            if(!from || !text) return;
            await addDoc(collection(db, "thanks"), { from, to, text });
            document.getElementById('t-from').value = ""; document.getElementById('t-to').value = ""; document.getElementById('t-text').value = "";
        };

        window.addBet = async () => {
            const creator = document.getElementById('b-crit').value;
            const challenger = document.getElementById('b-chal').value;
            const description = document.getElementById('b-desc').value;
            if(!description) return;
            await addDoc(collection(db, "bets"), { creator, challenger, description, status: "Ouvert" });
            document.getElementById('b-desc').value = "";
        };

        window.closeBet = async (id) => {
            await updateDoc(doc(db, "bets", id), { status: "Terminé" });
        };

        window.checkSutom = () => {
            const val = document.getElementById('sutom-in').value.toUpperCase();
            const res = document.getElementById('sutom-res');
            if(val === "OFFICE") res.innerText = "🎯 BRAVO ! Le mot était OFFICE.";
            else res.innerText = "❌ Faux, essayez encore (6 lettres).";
        };
    </script>

    <header class="bg-[#002A54] text-white p-6 shadow-md border-b-4 border-[#7BA4DB]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-4xl font-black tracking-wider text-center md:text-left office-font">DUNDER MIFFLIN</h1>
                <p class="text-xs font-bold tracking-widest text-[#7BA4DB] text-center md:text-left">SCRANTON BRANCH - HAPPINESS CENTER</p>
            </div>
            <div id="quote-box" class="mt-4 md:mt-0 max-w-sm bg-[#163D66] p-3 rounded border border-[#7BA4DB] text-center italic text-xs text-gray-200 shadow-inner">
                Loading Michael's wisdom...
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="bg-white p-5 rounded shadow-sm border-t-4 border-[#002A54]">
            <h2 class="text-xl font-bold mb-3 text-[#002A54] office-font border-b pb-1">👥 L'ÉQUIPE DU BUREAU</h2>
            <div class="mb-4 flex gap-1">
                <input type="text" id="p-name" placeholder="Nom du collègue..." class="flex-1 border p-1.5 text-xs rounded outline-none">
                <button onclick="addPlayer()" class="bg-[#002A54] text-white text-xs px-3 font-bold rounded">Embaucher</button>
            </div>
            <div id="players-list" class="space-y-2 max-h-[350px] overflow-y-auto">
                </div>
        </section>

        <section class="bg-white p-5 rounded shadow-sm border-t-4 border-yellow-500 lg:col-span-2">
            <h2 class="text-xl font-bold mb-3 text-gray-700 office-font border-b pb-1">🌤️ MOOD TRACKER INTERNE</h2>
            <div class="bg-yellow-50 p-3 rounded border border-yellow-200 mb-4">
                <h3 class="font-bold text-xs mb-2 text-yellow-900">Clique pour changer ta météo (Modifie le Player 1) :</h3>
                <div class="flex gap-2">
                    <button onclick="changeMood('😀')" class="text-2xl p-1.5 bg-white border rounded hover:scale-110 transition">😀</button>
                    <button onclick="changeMood('😊')" class="text-2xl p-1.5 bg-white border rounded hover:scale-110 transition">😊</button>
                    <button onclick="changeMood('😐')" class="text-2xl p-1.5 bg-white border rounded hover:scale-110 transition">😐</button>
                    <button onclick
