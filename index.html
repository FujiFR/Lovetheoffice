<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunder Mifflin Scranton - Happiness Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Petite touche pour l'ambiance "The Office" (Police type machine à écrire / corporate) */
        body { font-family: 'Courier New', Courier, monospace; }
        .office-font { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    </style>
</head>
<body class="bg-[#F3F2EF] text-gray-800 pb-12">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🛠️ REMPLACE CES INFORMATIONS PAR TES CLÉS FIREBASE 
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_AUTH_DOMAIN",
            projectId: "TON_PROJECT_ID",
            storageBucket: "TON_STORAGE_BUCKET",
            messagingSenderId: "TON_MESSAGING_SENDER_ID",
            appId: "TON_APP_ID"
        };

        // Initialisation de Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CITATIONS DE MICHAEL SCOTT ---
        const quotes = [
            "I'm not superstitious, but I am a little stitious.",
            "Would I rather be feared or loved? Easy. Both. I want people to be afraid of how much they love me.",
            "Sometimes I'll start a sentence and I don't even know where it's going.",
            "I am running away from my responsibilities. And it feels good.",
            "The worst thing about prison was the Dementors.",
            "I love inside jokes. I'd love to be a part of one someday.",
            "Toby is in HR, so he's not really a part of our family."
        ];
        document.getElementById('quote-box').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

        // ================= SYNCHRONISATION EN TEMPS RÉEL =================

        // 1. Les Joueurs / Collègues
        onSnapshot(collection(db, "players"), (snapshot) => {
            const container = document.getElementById('players-list');
            const gridMeteo = document.getElementById('meteo-grid');
            container.innerHTML = "";
            gridMeteo.innerHTML = "";
            
            snapshot.docs.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;

                // Liste latérale
                container.innerHTML += `
                    <div class="p-3 border rounded bg-gray-50 flex flex-col justify-between shadow-sm">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-md">${p.name}</span>
                            <span class="text-2xl">${p.mood || '😐'}</span>
                        </div>
                        <p class="text-xs text-gray-500 italic my-1">"${p.moodText || 'Working...'}"</p>
                        <button onclick="boostLove('${id}', ${p.love || 0})" class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded font-bold w-max mt-1 hover:bg-red-200 transition">
                            ❤️ Love (${p.love || 0})
                        </button>
                    </div>
                `;

                // Grille Météo
                gridMeteo.innerHTML += `
                    <div class="p-3 border rounded text-center bg-blue-50/50 shadow-inner">
                        <div class="text-3xl mb-1">${p.mood || '😐'}</div>
                        <div class="font-bold text-xs truncate">${p.name}</div>
                    </div>
                `;
            });
        });

        // 2. Les Post-its
        onSnapshot(collection(db, "posts"), (snapshot) => {
            const container = document.getElementById('posts-container');
            container.innerHTML = "";
            snapshot.docs.forEach(docSnap => {
                const post = docSnap.data();
                const id = docSnap.id;
                let commentsHtml = "";
                
                post.comments?.forEach(c => {
                    commentsHtml += `<p class="bg-white/70 p-1 rounded my-1 text-[11px]">💬 ${c}</p>`;
                });

                container.innerHTML += `
                    <div class="min-w-[240px] max-w-[240px] bg-amber-100 p-4 rounded shadow-md transform rotate-1 hover:rotate-0 transition flex flex-col justify-between border-b-4 border-amber-300">
                        <div>
                            <p class="text-xs font-semibold text-gray-700">${post.text}</p>
                            ${post.media ? `<img src="${post.media}" class="w-full h-24 object-cover rounded my-2" />` : ''}
                        </div>
                        <div class="border-t pt-2 mt-2 border-amber-200">
                            <div class="max-h-20 overflow-y-auto mb-2">${commentsHtml}</div>
                            <div class="flex gap-1">
                                <input type="text" id="input-${id}" placeholder="Répondre..." class="w-full text-xs p-1 rounded border bg-white outline-none">
                                <button onclick="sendComment('${id}', ${JSON.stringify(post.comments || []).replace(/"/g, '&quot;')})" class="bg-amber-600 text-white text-xs px-2 rounded">📤</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        // 3. Les Cartons / Sanctions
        onSnapshot(collection(db, "cards"), (snapshot) => {
            const container = document.getElementById('cards-list');
            container.innerHTML = "";
            snapshot.docs.forEach(docSnap => {
                const c = docSnap.data();
                const id = docSnap.id;

                container.innerHTML += `
                    <div class="p-3 border rounded shadow-sm ${c.color === 'Red' ? 'bg-red-50 border-red-200' : 'bg-yellow-50 border-yellow-200'}">
                        <div class="flex justify-between font-bold text-sm">
                            <span>${c.color === 'Red' ? '🟥' : '🟨'} Pour ${c.target}</span>
                            <span class="bg-white px-2 rounded text-[10px] border">${c.status}</span>
                        </div>
                        <p class="text-xs my-1"><strong>Motif :</strong> ${c.reason}</p>
                        <p class="text-xs text-purple-950 font-semibold"><strong>Gage :</strong> ${c.pledge}</p>
                        
                        ${!c.contested && c.status === 'En attente' ? `
                            <button onclick="contest('${id}')" class="mt-2 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded font-bold">Contester ✋</button>
                        ` : ''}

                        ${c.contested && c.status === 'En attente' ? `
                            <div class="mt-2 p-1.5 bg-white/80 rounded text-[11px]">
                                <p class="text-orange-700 italic">"Contestation : ${c.contestReason}"</p>
                                <div class="mt-1 flex gap-2">
                                    <button onclick="vote('${id}', ${c.votesYes}, ${c.votesNo}, 'yes', '${c.status}')" class="bg-green-600 text-white px-2 py-0.5 rounded">Maintenir (${c.votesYes})</button>
                                    <button onclick="vote('${id}', ${c.votesYes}, ${c.votesNo}, 'no', '${c.status}')" class="bg-gray-500 text-white px-2 py-0.5 rounded">Annuler (${c.votesNo})</button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        });
